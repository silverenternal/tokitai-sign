name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt -- --check
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      - run: cargo run -- --snapshot
      - name: Visual quality report
        shell: bash
        run: |
          cargo run -- --record-frames target/visual-frames.jsonl --no-calibration
          cargo run -- --score-frames target/visual-frames.jsonl
      - name: Report release binary size
        shell: bash
        run: |
          if [ -f target/release/tokitai-sign.exe ]; then
            wc -c target/release/tokitai-sign.exe
          else
            wc -c target/release/tokitai-sign
          fi
